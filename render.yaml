services:
  - type: web
    name: butakeando
    runtime: docker
    region: frankfurt
    plan: starter
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: SERVE_FRONTEND
        value: "true"
      - key: FRONTEND_DIST_PATH
        value: /app/frontend/dist
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: butakeando-db
          property: connectionString
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ORDER_NOTIFICATION_EMAIL
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false

databases:
  - name: butakeando-db
    region: frankfurt
    plan: basic-1gb
